<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kenes</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/forms.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-brand">
                <a href="index.html">Kenes</a>
            </div>
            <ul class="navbar-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="register-customer.html">Register</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p class="text-secondary">Please sign in to your account</p>
            </div>

            <form class="needs-validation" novalidate action="login.php" method="POST">

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required data-validate="email"
                        placeholder="you@example.com">
                    <div class="feedback-message invalid-feedback"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required
                        placeholder="Enter your password">
                    <div class="feedback-message invalid-feedback"></div>
                </div>

                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Sign In</button>

                <div class="auth-footer">
                    <p><a href="#">Forgot password?</a></p>
                    <p class="mt-2">Don't have an account? <a href="register-customer.html">Register</a></p>
                    <p class="mt-1"><a href="register-consultant.html"
                            style="color: var(--color-gray-500); font-size: 12px;">Consultant Login</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="js/form-validation.js"></script>
    <script src="js/navbar.js"></script>
</body>

</html>
