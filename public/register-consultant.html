<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultant Registration - Kenes</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/forms.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="container navbar-container">
            <div class="navbar-brand">
                <a href="index.html">Kenes</a>
            </div>
            <ul class="navbar-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card" style="border-top: 4px solid var(--color-green-primary);">
            <div class="auth-header">
                <h1>Consultant Portal</h1>
                <p class="text-secondary">Register as a financial lending consultant</p>
            </div>

            <form class="needs-validation" novalidate action="/register-consultant" method="POST">

                <div class="form-group">
                    <label class="form-label" for="full_name">Full Name</label>
                    <input type="text" class="form-control" id="full_name" name="full_name" required
                        placeholder="Jane Smith">
                    <div class="feedback-message invalid-feedback"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required data-validate="email"
                        placeholder="consultant@kenes.com">
                    <div class="feedback-message invalid-feedback"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="employee_code">Employee Code</label>
                    <input type="text" class="form-control" id="employee_code" name="employee_code" required
                        placeholder="EMP-XXXX">
                    <div class="feedback-message invalid-feedback"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="department">Department</label>
                    <select class="form-control" id="department" name="department" required>
                        <option value="" disabled selected>Select Department</option>
                        <option value="sme">SME Lending</option>
                        <option value="micro">Microcredit</option>
                        <option value="risk">Risk Analysis</option>
                        <option value="operations">Operations</option>
                    </select>
                    <div class="feedback-message invalid-feedback"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required
                        data-validate="password" placeholder="Min. 8 chars, 1 Upper, 1 Lower, 1 Number">
                    <div class="feedback-message invalid-feedback"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm_password">Confirm Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required
                        data-validate="confirm-password" placeholder="Confirm your password">
                    <div class="feedback-message invalid-feedback"></div>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Create Consultant Account</button>

                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Sign In</a></p>
                    <p class="mt-2"><a href="register-customer.html">Register as Customer instead</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="js/form-validation.js"></script>
    <script src="js/navbar.js"></script>
</body>

</html>
